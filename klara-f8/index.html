<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Product Admin</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">Store<span>Admin</span></a>
            <nav>
                <a href="index.html" class="active">Home</a>
                <a href="./create.html">Create Product</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div id="product" class="product-grid"></div>
    </main>

    <div class="content" id="modalContainer">
        <div class="modal">
            <h3>Update Product</h3>
            <p class="modal-subtitle">Modify the product details below</p>

            <div class="input-group">
                <label for="title">Product Name</label>
                <input type="text" id="title" placeholder="Enter title...">
            </div>

            <div class="input-group">
                <label for="price">Price ($)</label>
                <input type="number" id="price" placeholder="Enter price...">
            </div>

            <div class="input-group">
                <label for="image">Image URL</label>
                <input type="url" id="image" placeholder="Enter image URL...">
            </div>

            <div class="modal-btns">
                <button id="submit" class="btn-primary">Save Changes</button>
                <button id="close" class="btn-secondary">Close</button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>

</html>
